name: LETSGO cooldown

on:
  schedule:
    - cron: "0 1 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  notify:
    runs-on: ubuntu-latest

    env:
      DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install pandas yahooquery numpy

      - name: Run first attempt
        run: |
          rm -f message.txt
          python3 main.py

      - name: Check retry after first attempt
        id: retry1
        run: |
          NEEDS_RETRY=$(python3 - <<'PY'
          import json
          import os

          if not os.path.exists("letsgo_status.json"):
              print("false")
          else:
              with open("letsgo_status.json", "r") as f:
                  data = json.load(f)
              print("true" if data.get("needsRetry") else "false")
          PY
          )

          echo "needs_retry=$NEEDS_RETRY" >> "$GITHUB_OUTPUT"
          echo "Retry needed after first attempt: $NEEDS_RETRY"

      - name: Wait before second attempt
        if: steps.retry1.outputs.needs_retry == 'true'
        run: |
          sleep 3600

      - name: Run second attempt
        if: steps.retry1.outputs.needs_retry == 'true'
        run: |
          rm -f message.txt
          python3 main.py

      - name: Check retry after second attempt
        id: retry2
        run: |
          NEEDS_RETRY=$(python3 - <<'PY'
          import json
          import os

          if not os.path.exists("letsgo_status.json"):
              print("false")
          else:
              with open("letsgo_status.json", "r") as f:
                  data = json.load(f)
              print("true" if data.get("needsRetry") else "false")
          PY
          )

          echo "needs_retry=$NEEDS_RETRY" >> "$GITHUB_OUTPUT"
          echo "Retry needed after second attempt: $NEEDS_RETRY"

      - name: Wait before third attempt
        if: steps.retry2.outputs.needs_retry == 'true'
        run: |
          sleep 3600

      - name: Run third attempt
        if: steps.retry2.outputs.needs_retry == 'true'
        run: |
          rm -f message.txt
          python3 main.py

      - name: Send Discord notification
        run: |
          if [ -z "$DISCORD_WEBHOOK_URL" ]; then
            echo "DISCORD_WEBHOOK_URL secret is missing or empty."
            exit 1
          fi

          if [ ! -f message.txt ]; then
            echo "No message.txt found. Nothing to send."
            exit 0
          fi

          MESSAGE=$(cat message.txt)

          if [ -z "$MESSAGE" ]; then
            echo "message.txt is empty. Nothing to send."
            exit 0
          fi

          MESSAGE="${MESSAGE:0:1900}"

          jq -n --arg content "$MESSAGE" '{content: $content}' > payload.json

          curl -X POST \
            -H "Content-Type: application/json" \
            -d @payload.json \
            "$DISCORD_WEBHOOK_URL"

      - name: Commit and push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

          git add .

          git diff --cached --quiet && echo "No changes to commit" && exit 0

          git commit -m "Update current indicator data [ci skip]"

          git pull --rebase origin main

          git push origin main
