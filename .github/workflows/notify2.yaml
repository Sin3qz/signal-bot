name: LETSGO cooldown

on:
  schedule:
    - cron: "0 1 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  notify:
    runs-on: ubuntu-latest

    env:
      DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install pandas yahooquery numpy

      - name: Run bot
        run: |
          rm -f message.txt
          python3 main.py

      - name: Send Discord notification
        run: |
          if [ -z "$DISCORD_WEBHOOK_URL" ]; then
            echo "DISCORD_WEBHOOK_URL secret is missing or empty."
            exit 1
          fi

          if [ ! -f message.txt ]; then
            echo "No message.txt found. Nothing to send."
            exit 0
          fi

          MESSAGE=$(cat message.txt)

          if [ -z "$MESSAGE" ]; then
            echo "message.txt is empty. Nothing to send."
            exit 0
          fi

          jq -n --arg content "$MESSAGE" '{content: $content}' > payload.json

          curl -X POST \
            -H "Content-Type: application/json" \
            -d @payload.json \
            "$DISCORD_WEBHOOK_URL"

      - name: Commit and push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

          git pull --rebase origin main

          git add .
          git commit -m "Update current indicator data [ci skip]" || echo "No changes to commit"

          git push origin main
